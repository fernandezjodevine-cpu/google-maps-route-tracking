<!DOCTYPE html>
<html>
<head>
<title>Route Tracking with Autocomplete</title>

<style>
#map{
height:500px;
width:100%;
}

body{
font-family:Arial, sans-serif;
}

.controls{
margin-bottom:10px;
}
</style>

</head>

<body>

<h1>Route Tracking Map</h1>

<div class="controls">
<label>Enter Destination:</label>
<input id="destination" type="text" placeholder="Type a location">
<button onclick="calculateRoute()">Get Route</button>
</div>

<div id="map"></div>

<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDC7jJfgpwDI4SU8CmxD3OUsgIJ_OXpnl8&libraries=places&callback=initMap">
</script>

<script>

let map;
let directionsService;
let directionsRenderer;
let currentLocation;
let autocomplete;
let destinationPlace;

function initMap(){

map=new google.maps.Map(document.getElementById("map"),{
zoom:12,
center:{lat:7.1907,lng:125.4553}
});

directionsService=new google.maps.DirectionsService();
directionsRenderer=new google.maps.DirectionsRenderer();
directionsRenderer.setMap(map);

// AUTOCOMPLETE DROPDOWN
autocomplete=new google.maps.places.Autocomplete(
document.getElementById("destination")
);

autocomplete.addListener("place_changed",function(){
destinationPlace=autocomplete.getPlace();
});

// GET CURRENT LOCATION
if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(

function(position){

currentLocation={
lat:position.coords.latitude,
lng:position.coords.longitude
};

map.setCenter(currentLocation);

new google.maps.Marker({
position:currentLocation,
map:map,
title:"Your Current Location"
});

},

function(){

alert("Location unavailable. Using default location.");

currentLocation={lat:7.1907,lng:125.4553};

}

);

}

else{

currentLocation={lat:7.1907,lng:125.4553};

}

}

function calculateRoute(){

if(!destinationPlace){
alert("Please choose a destination from the dropdown.");
return;
}

let request={
origin:currentLocation,
destination:destinationPlace.geometry.location,
travelMode:google.maps.TravelMode.DRIVING
};

directionsService.route(request,function(result,status){

if(status==="OK"){
directionsRenderer.setDirections(result);
}

else{
alert("Route failed: "+status);
}

});

}

</script>

</body>
</html>
