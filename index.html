<!DOCTYPE html>
<html>
<head>
<title>Route Tracking with Google Maps API</title>
<style>
#map {
height: 500px;
width: 100%;
}
body {
font-family: Arial, sans-serif;
}
.controls {
margin-bottom: 10px;
}
</style>
</head>
<body>
<h1>Route Tracking Map</h1>
<div class="controls">
<label for="destination">Choose Destination:</label>
<select id="destination">
<option value="7.0640,125.6095">Davao City</option>
<option value="7.0130,125.4970">Toril</option>
<option value="7.0307,125.5009">Lizada</option>
<option value="7.0714,125.7083">Samal Island</option>
</select>
<button onclick="calculateRoute()">Get Route</button>
</div>
<div id="map"></div>

<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDC7jJfgpwDI4SU8CmxD3OUsgIJ_OXpnl8&callback=initMap">
</script>

<script>
let map, directionsService, directionsRenderer;
let currentLocation;

function initMap() {
// Initialize map
map = new google.maps.Map(document.getElementById("map"), {
zoom: 12,
center: { lat: 7.1907, lng: 125.4553 } // Default center
});

directionsService = new google.maps.DirectionsService();
directionsRenderer = new google.maps.DirectionsRenderer();
directionsRenderer.setMap(map);

// Get current location
if (navigator.geolocation) {
navigator.geolocation.getCurrentPosition(
(position) => {
currentLocation = {
lat: position.coords.latitude,
lng: position.coords.longitude
};
map.setCenter(currentLocation);
new google.maps.Marker({
position: currentLocation,
map: map,
title: "Your Current Location"
});
},
() => {
alert("Unable to access your location. Default map center used.");
}
);
} else {
alert("Geolocation is not supported by this browser.");
}
}

function calculateRoute() {
const destValue = document.getElementById("destination").value;
const [lat, lng] = destValue.split(',').map(Number);
const destination = { lat, lng };

if (!currentLocation) {
alert("Current location not available.");
return;
}

const request = {
origin: currentLocation,
destination: destination,
travelMode: google.maps.TravelMode.DRIVING
};

directionsService.route(request, (result, status) => {
if (status === "OK") {
directionsRenderer.setDirections(result);
} else {
alert("Could not calculate route: " + status);
}
});
}
</script>
</body>
</html>
